<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Regional Coastal SST Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #eeeeee; 
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 { margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 20px; }

        #controls { 
            background: #1e1e1e; 
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        input[type=range] { width: 400px; cursor: pointer; }
        #date-display { font-size: 1.4em; font-weight: bold; color: #4da6ff; min-width: 120px; text-align: center; }

        /* Legend container styling */
        #legend-container {
            margin-bottom: 30px;
            background: #1e1e1e;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        #map-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1600px;
        }

        .region-panel {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .region-title { 
            font-size: 1.2em; 
            font-weight: bold; 
            margin-bottom: 15px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        svg { background: #0a0a0a; border-radius: 4px; }
        
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            border: 1px solid #555;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>California Coastal Sea Surface Temperatures</h1>
    <div class="subtitle">GOES Satellite Daily Averages</div>
    
    <div id="controls">
        <label for="time-slider" style="font-weight: bold;">Timeline:</label>
        <input type="range" id="time-slider" min="0" value="0" step="1">
        <span id="date-display">Loading Data...</span>
    </div>

    <!-- Container for the Color Scale Legend -->
    <div id="legend-container"></div>

    <div id="map-container"></div>
    <div id="tooltip" class="tooltip"></div>

    <script>
        const panelWidth = 400;
        const panelHeight = 400;
        const rectSize = 6; 

        // Define our temperature bounds for the California coast
        const tempMin = 50;
        const tempMax = 75;
        const colorScale = d3.scaleSequential(d3.interpolateTurbo).domain([tempMin, tempMax]);
        const tooltip = d3.select("#tooltip");

        const regionConfigs = {
            "Mendocino": { center: [-123.8, 39.3], scale: 12000 },
            "San Francisco": { center: [-122.4, 37.7], scale: 12000 },
            "Monterey": { center: [-121.9, 36.6], scale: 12000 },
            "San Diego": { center: [-117.2, 32.7], scale: 12000 }
        };

        // --- NEW: Legend Generation Function ---
        function drawLegend() {
            const legendWidth = 400;
            const legendHeight = 20;
            
            const svg = d3.select("#legend-container").append("svg")
                .attr("width", legendWidth + 40)
                .attr("height", 50);

            const defs = svg.append("defs");
            const linearGradient = defs.append("linearGradient")
                .attr("id", "linear-gradient");

            // Generate color stops for the gradient based on our Turbo scale
            linearGradient.selectAll("stop")
                .data(d3.range(0, 1.05, 0.05))
                .enter().append("stop")
                .attr("offset", d => d * 100 + "%")
                .attr("stop-color", d => d3.interpolateTurbo(d));

            svg.append("rect")
                .attr("x", 20)
                .attr("y", 10)
                .attr("width", legendWidth)
                .attr("height", legendHeight)
                .style("fill", "url(#linear-gradient)");

            // Add axis to the legend
            const xScale = d3.scaleLinear()
                .domain([tempMin, tempMax])
                .range([0, legendWidth]);

            const xAxis = d3.axisBottom(xScale)
                .ticks(6)
                .tickFormat(d => d + "°F");

            svg.append("g")
                .attr("transform", "translate(20, 30)")
                .call(xAxis)
                .select(".domain").remove(); // Remove the solid axis line for a cleaner look
                
            // Make legend text white
            svg.selectAll("text").style("fill", "#eee");
            svg.selectAll("line").style("stroke", "#eee");
        }

        function createDashboard(regionalSstCsv, californiaGeoJson) {
            const dataByDate = d3.group(regionalSstCsv, d => d.date);
            const dates = Array.from(dataByDate.keys()).sort();
            const regions = ["Mendocino", "San Francisco", "Monterey", "San Diego"];

            const localProjections = {};
            regions.forEach(region => {
                const config = regionConfigs[region];
                localProjections[region] = d3.geoMercator()
                    .center(config.center)
                    .scale(config.scale)
                    .translate([panelWidth / 2, panelHeight / 2]);
            });

            const container = d3.select("#map-container");
            const panels = container.selectAll(".region-panel")
                .data(regions)
                .join("div")
                .attr("class", "region-panel");
            
            panels.append("div").attr("class", "region-title").text(d => d);

            const svgs = panels.append("svg")
                .attr("width", panelWidth)
                .attr("height", panelHeight)
                .attr("id", d => `svg-${d.replace(/\s+/g, '-')}`);

            regions.forEach(region => {
                const svg = d3.select(`#svg-${region.replace(/\s+/g, '-')}`);
                const proj = localProjections[region];
                const pathGenerator = d3.geoPath().projection(proj);

                svg.append("g")
                    .selectAll("path")
                    .data(californiaGeoJson.features)
                    .join("path")
                    .attr("d", pathGenerator)
                    .attr("fill", "#444") 
                    .attr("stroke", "#666")
                    .attr("stroke-width", 1);
            });

            function renderState(dateIndex) {
                const targetDate = dates[dateIndex];
                d3.select("#date-display").text(targetDate);

                const currentDataByDate = dataByDate.get(targetDate) || [];
                const currentDataByRegion = d3.group(currentDataByDate, d => d.region);

                regions.forEach(region => {
                    const regionData = currentDataByRegion.get(region) || [];
                    const proj = localProjections[region];
                    const svg = d3.select(`#svg-${region.replace(/\s+/g, '-')}`);

                    svg.selectAll(".pixel")
                        .data(regionData, d => `${d.lat}-${d.lon}`)
                        .join(
                            enter => enter.append("rect")
                                .attr("class", "pixel")
                                .attr("x", d => proj([d.lon, d.lat])[0])
                                .attr("y", d => proj([d.lon, d.lat])[1])
                                .attr("width", rectSize)
                                .attr("height", rectSize)
                                .attr("fill", d => colorScale(d.sst))
                                .on("mouseover", (event, d) => {
                                    tooltip.style("opacity", 1)
                                        .html(`<strong>${d.region}</strong><br/>Temp: ${d.sst.toFixed(1)}°F`)
                                        .style("left", (event.pageX + 15) + "px")
                                        .style("top", (event.pageY - 20) + "px");
                                })
                                .on("mouseout", () => tooltip.style("opacity", 0)),
                            update => update.transition().duration(400).attr("fill", d => colorScale(d.sst)),
                            exit => exit.remove()
                        );
                });
            }

            const slider = d3.select("#time-slider")
                .attr("max", dates.length - 1)
                .on("input", function() { renderState(+this.value); });

            // Call the legend function
            drawLegend();
            renderState(0);
        }

        const geoJsonUrl = "https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json";

        Promise.all([
            d3.csv("regional_coastal_sst.csv", d => {
                // --- NEW: KELVIN TO FAHRENHEIT FIX ---
                let rawTemp = +d.sst_fahrenheit;
                // If the temperature is over 200, it's definitely Kelvin. 
                // Formula: (K − 273.15) × 9/5 + 32
                let actualFahrenheit = rawTemp > 200 ? (rawTemp - 273.15) * 9/5 + 32 : rawTemp;
                
                return {
                    region: d.region, 
                    date: d.date, 
                    lat: +d.lat, 
                    lon: +d.lon, 
                    sst: actualFahrenheit 
                };
            }),
            d3.json(geoJsonUrl)
        ]).then(([regionalSst, usGeoJson]) => {
            const californiaGeo = {
                type: "FeatureCollection",
                features: usGeoJson.features.filter(f => f.properties.name === "California")
            };
            createDashboard(regionalSst, californiaGeo);
        }).catch(err => {
            console.error(err);
            d3.select("#date-display").text("Error loading files!").style("color", "red");
        });
    </script>
</body>
</html>
