<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coastal Regional SST Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; margin: 20px; }
        h1 { text-align: center; }
        
        /* Flexbox handles the side-by-side layout automatically */
        #map-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .region-panel {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .region-title { font-weight: bold; margin-bottom: 10px; font-size: 1.2em; }
        
        /* Controls Styling */
        #controls { text-align: center; margin: 20px 0; padding: 15px; background: #1e1e1e; border-radius: 8px;}
        input[type=range] { width: 300px; }
        #date-display { font-weight: bold; font-size: 1.2em; margin-left: 15px; color: #4da6ff; }
    </style>
</head>
<body>

    <h1>Coastal Sea Surface Temperature</h1>
    
    <div id="controls">
        <label for="time-slider">Timeline: </label>
        <input type="range" id="time-slider" min="0" value="0" step="1">
        <span id="date-display">Loading...</span>
    </div>

    <div id="map-container"></div>

    <script>
        // 1. Core Dimensions & Settings
        const panelWidth = 350;
        const panelHeight = 350;
        // The size of each "pixel" in the heatmap
        const rectSize = 4; 

        // 2. Global Scales
        // A fixed color scale ensures temperatures mean the same thing across all 4 maps
        const colorScale = d3.scaleSequential(d3.interpolateTurbo).domain([50, 75]);

        // 3. Load the Data
        d3.csv("regional_coastal_sst.csv", d => {
            return {
                region: d.region,
                date: d.date,
                lat: +d.lat,
                lon: +d.lon,
                sst: +d.sst_fahrenheit
            };
        }).then(data => {
            
            // 4. Data Processing & Hierarchy
            // Group by Date first, then by Region
            const dataByDate = d3.group(data, d => d.date);
            const dates = Array.from(dataByDate.keys()).sort();
            
            // Group the raw data by region to figure out local scales
            const dataByRegion = d3.group(data, d => d.region);
            const regions = Array.from(dataByRegion.keys());

            // 5. Setup Localized Scales per Region
            // Geographic projection is computationally heavy for thousands of dense pixels.
            // For small bounding boxes, mapping Lat/Lon to linear X/Y scales is mathematically
            // accurate enough and significantly faster for the browser DOM.
            const localScales = {};
            
            regions.forEach(region => {
                const regionData = dataByRegion.get(region);
                const lonExt = d3.extent(regionData, d => d.lon);
                const latExt = d3.extent(regionData, d => d.lat);

                localScales[region] = {
                    x: d3.scaleLinear().domain(lonExt).range([0, panelWidth]),
                    // Note: Latitude is inverted in SVG (Y goes down, North goes up)
                    y: d3.scaleLinear().domain(latExt).range([panelHeight, 0]) 
                };
            });

            // 6. Build the DOM Structure (The "Small Multiples")
            const container = d3.select("#map-container");
            
            const panels = container.selectAll(".region-panel")
                .data(regions)
                .join("div")
                .attr("class", "region-panel");
            
            // Add titles to each panel
            panels.append("div")
                .attr("class", "region-title")
                .text(d => d);

            // Add SVG canvases to each panel
            const svgs = panels.append("svg")
                .attr("width", panelWidth)
                .attr("height", panelHeight)
                .attr("id", d => `svg-${d.replace(/\s+/g, '-')}`);

            // 7. The Core Update Function
            function renderDate(dateIndex) {
                const targetDate = dates[dateIndex];
                d3.select("#date-display").text(targetDate);

                // Get the data for this specific date, grouped by region
                const currentDataByRegion = d3.group(dataByDate.get(targetDate), d => d.region);

                // Iterate through each region and update its specific SVG
                regions.forEach(region => {
                    const regionData = currentDataByRegion.get(region) || [];
                    const scaleX = localScales[region].x;
                    const scaleY = localScales[region].y;

                    // Select the specific SVG for this region
                    const svg = d3.select(`#svg-${region.replace(/\s+/g, '-')}`);

                    // Data Join (Enter, Update, Exit)
                    svg.selectAll("rect")
                        // Using lat+lon as the key ensures D3 tracks the exact pixels over time
                        .data(regionData, d => `${d.lat}-${d.lon}`) 
                        .join(
                            enter => enter.append("rect")
                                .attr("x", d => scaleX(d.lon))
                                .attr("y", d => scaleY(d.lat))
                                .attr("width", rectSize)
                                .attr("height", rectSize)
                                .attr("fill", d => colorScale(d.sst)),
                            update => update
                                .transition()
                                .duration(500) // 500ms smooth color crossfade
                                .attr("fill", d => colorScale(d.sst)),
                            exit => exit.remove()
                        );
                });
            }

            // 8. Wire up the Timeline Slider
            const slider = d3.select("#time-slider")
                .attr("max", dates.length - 1)
                .on("input", function() {
                    renderDate(+this.value);
                });

            // Initialize the first frame
            renderDate(0);
        });
    </script>
</body>
</html>
